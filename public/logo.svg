<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fully transparent background - no rect fill -->
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
  <!-- ED Text with gradient - no background -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial Black, Impact, sans-serif"
    font-weight="900" font-size="200" fill="url(#textGrad)" letter-spacing="-8">ED</text>
</svg>
