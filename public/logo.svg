<svg viewBox="0 0 200 70" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="50%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
  <!-- Icon box -->
  <rect x="2" y="2" width="66" height="66" rx="16" fill="url(#grad1)" fill-opacity="0.12"/>
  <rect x="2" y="2" width="66" height="66" rx="16" stroke="url(#grad1)" stroke-width="1.5"/>
  <!-- ED letters -->
  <text x="35" y="50" text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900" font-size="34"
        fill="url(#grad1)">ED</text>
  <!-- Wordmark -->
  <text x="118" y="30" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-weight="800" font-size="17"
        fill="url(#grad1)" letter-spacing="2">EMOJI</text>
  <text x="118" y="52" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-weight="800" font-size="17"
        fill="url(#grad1)" letter-spacing="2">DIGITALS</text>
</svg>
